<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ClipVault · 设置</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:14px;color:#c9d1d9;background:#0d1117;max-width:500px;margin:40px auto;padding:0 20px}
h1{font-size:22px;color:#58a6ff;margin-bottom:8px}
.subtitle{color:#8b949e;font-size:13px;margin-bottom:24px}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px;margin-bottom:20px}
.card h2{font-size:15px;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #30363d}
.field{margin-bottom:16px}
.field label{display:block;font-weight:600;margin-bottom:4px;font-size:13px}
.field .hint{font-size:12px;color:#8b949e;margin-bottom:6px}
.field input,.field select{width:100%;padding:8px 12px;font-size:13px;border:1px solid #30363d;border-radius:6px;background:#0d1117;color:#c9d1d9}
.field input:focus,.field select:focus{outline:none;border-color:#58a6ff}
.btn{padding:8px 20px;font-size:14px;font-weight:600;border-radius:6px;cursor:pointer;border:none;background:#238636;color:#fff}
.btn:hover{background:#2ea043}
.btn:disabled{opacity:.65}
#status{margin-left:12px;font-size:13px;color:#3fb950;display:none}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px}
.stat-item{text-align:center;padding:12px;background:#0d1117;border-radius:8px}
.stat-value{font-size:28px;font-weight:700;color:#58a6ff}
.stat-label{font-size:11px;color:#8b949e;margin-top:4px}
</style>
</head>
<body>
<h1>📋 ClipVault 设置</h1>
<p class="subtitle">管理剪贴板历史与偏好</p>

<div class="card">
  <h2>📊 统计</h2>
  <div class="stat-grid">
    <div class="stat-item"><div class="stat-value" id="stat-total">-</div><div class="stat-label">总记录数</div></div>
    <div class="stat-item"><div class="stat-value" id="stat-pinned">-</div><div class="stat-label">已置顶</div></div>
    <div class="stat-item"><div class="stat-value" id="stat-avg">-</div><div class="stat-label">平均字数</div></div>
  </div>
</div>

<div class="card">
  <h2>存储设置</h2>
  <div class="field">
    <label>最大保存条数</label>
    <div class="hint">超出后自动删除最早的记录</div>
    <input type="number" id="max-items" min="50" max="1000" step="50">
  </div>
  <div class="field">
    <label>自动清理 (天)</label>
    <div class="hint">超过指定天数的记录自动删除。0 = 永不清理</div>
    <input type="number" id="auto-clean" min="0" max="365" value="30">
  </div>
</div>

<div class="card">
  <button class="btn" id="save">保存设置</button>
  <span id="status"></span>
</div>

<script src="options.js"></script>
</body>
</html>
